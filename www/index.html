<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      gap: 16px;
    }
    h1 { font-size: 24px; }
    input[type="url"] {
      width: 100%; max-width: 500px;
      padding: 12px 16px; font-size: 15px;
      background: #16213e; border: 1px solid #0f3460;
      border-radius: 8px; color: #eee; outline: none;
    }
    button {
      padding: 12px 32px; font-size: 16px;
      background: #e94560; color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    #status    { color: #aaa; font-size: 13px; min-height: 18px; }
    #songTitle { font-size: 17px; font-weight: 600; }
    audio      { width: 100%; max-width: 500px; }
  </style>
</head>
<body>
  <h1>🎵 Music App</h1>
  <input id="urlInput" type="url" placeholder="Paste a YouTube URL…" />
  <button id="playBtn">▶ Play</button>
  <p id="status">Paste a URL and tap Play</p>
  <p id="songTitle"></p>
  <audio id="player" controls></audio>

  <script src="app.js"></script>
</body>
</html>
