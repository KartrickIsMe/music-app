<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple YouTube Audio Player</title>
  <style>
    body {
      font-family: -apple-system, Roboto, sans-serif;
      padding: 24px;
      background: #121212;
      color: #f5f5f5;
    }
    h1 {
      font-size: 18px;
      margin-bottom: 16px;
    }
    input {
      width: 100%;
      padding: 12px;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #444;
      background: #1e1e1e;
      color: #fff;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #4cafef;
      color: #000;
      font-weight: 600;
    }
    button:disabled {
      opacity: 0.5;
    }
    #status {
      margin-top: 12px;
      font-size: 14px;
      color: #aaa;
    }
    audio {
      width: 100%;
      margin-top: 20px;
    }
    #log-panel {
      margin-top: 20px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #1a1a1a;
    }
    #log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid #333;
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
    }
    #clear-log-btn {
      width: auto;
      padding: 4px 10px;
      font-size: 11px;
      background: #333;
      color: #ccc;
    }
    #log-output {
      height: 180px;
      overflow-y: auto;
      padding: 10px 12px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #8fd17a;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-line.error { color: #ff6b6b; }
  </style>
</head>
<body>

  <h1>Paste a YouTube link to play its audio</h1>

  <input
    id="youtube-url"
    type="text"
    placeholder="https://www.youtube.com/watch?v=..."
  />

  <button id="play-button">Play Audio</button>

  <div id="status"></div>

  <!-- This is the actual audio player. app.js sets its "src" and -->
  <!-- calls .play() once the native (Java) side hands back a      -->
  <!-- playable local file URL.                                    -->
  <audio id="audio-player" controls></audio>

  <div id="log-panel">
    <div id="log-header">
      <span>Log</span>
      <button id="clear-log-btn" type="button">Clear</button>
    </div>
    <div id="log-output"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
